<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;
}

h1{
font-size:40px;
}

#message{
font-size:20px;
width:70%;
margin-top:20px;
min-height:40px;
}

button{
margin-top:30px;
padding:12px 25px;
border:none;
border-radius:25px;
font-size:18px;
background:white;
color:#ff4f81;
cursor:pointer;
}

.heart{
position:absolute;
color:white;
font-size:20px;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

</style>

<script>

let text="Hey my love ❤️ I made this little page just for you. Every moment with you makes my life brighter. You are my happiness, my peace, and my favorite person.";

let i=0;

function typeWriter(){
if(i<text.length){
document.getElementById("message").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter,40);
}
}

let popMessages=[
"I love you ❤️",
"You are my favorite person 💕",
"You make my life beautiful 🌸",
"You are my kammo ji 🐶❤️",
"I’m lucky to have you 💖"
];

function showLove(){
let random=popMessages[Math.floor(Math.random()*popMessages.length)];
alert(random);
}

function createHearts(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},6000);
}

setInterval(createHearts,300);

</script>

</head>

<body onload="typeWriter()">

<h1>For You ❤️</h1>

<div id="message"></div>

<button onclick="showLove()">Tap Me 💌</button>

<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

</body>
</html>
